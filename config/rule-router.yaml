# Rule Router Unified Configuration
# Single binary with selectable features: router, gateway, scheduler
# Enable/disable via config or env vars (RR_FEATURES_ROUTER, RR_FEATURES_GATEWAY, RR_FEATURES_SCHEDULER)

# Feature Selection
# When no features block is present, router is enabled by default (backward compatible)
features:
  router: true       # NATS-to-NATS message routing
  gateway: false     # Bidirectional HTTP-NATS integration
  scheduler: false   # Cron-based scheduled publishing

# NATS Server Connection and JetStream Configuration
nats:
  urls:
    - nats://localhost:4222

  # Authentication (choose one)
  # username: "rule-router-service"
  # password: "secure-password"
  # token: "your-nats-token"
  # nkeySeedFile: "/path/to/nkey.seed"
  # credsFile: "/etc/nats/creds/rule-router.creds"

  # TLS Configuration
  tls:
    enable: false
    # certFile: "/etc/ssl/nats/client-cert.pem"
    # keyFile: "/etc/ssl/nats/client-key.pem"
    # caFile: "/etc/ssl/nats/ca.pem"

  # JetStream Consumer Configuration (used by router and gateway features)
  consumers:
    consumerPrefix: "rule-router"
    workerCount: 4
    fetchBatchSize: 10
    fetchTimeout: 5s
    maxAckPending: 1000
    ackWaitTimeout: 30s
    maxDeliver: 3
    deliverPolicy: "new"
    replayPolicy: "instant"

  # NATS Connection Behavior
  connection:
    maxReconnects: -1
    reconnectWait: 50ms

  # Action Publish Configuration
  publish:
    mode: jetstream    # "jetstream" (reliable) or "core" (fire-and-forget)
    ackTimeout: 5s
    maxRetries: 3
    retryBaseDelay: 50ms

# HTTP Configuration (used when features.gateway or features.scheduler is enabled)
http:
  # Inbound HTTP server (gateway only)
  server:
    address: ":8080"
    readTimeout: 30s
    writeTimeout: 30s
    idleTimeout: 120s
    maxHeaderBytes: 1048576
    shutdownGracePeriod: 30s
    inboundWorkerCount: 10
    inboundQueueSize: 100

  # Outbound HTTP client (gateway and scheduler)
  client:
    timeout: 30s
    maxIdleConns: 100
    maxIdleConnsPerHost: 10
    idleConnTimeout: 90s
    tls:
      insecureSkipVerify: false

# NATS Key-Value Store Configuration
kv:
  enabled: false
  buckets: []
  # buckets:
  #   - "device_status"
  #   - name: "customer_data"
  #     keyFilter: "region-us.>"

  # KV-Based Rule Storage (optional, replaces file-based rules)
  # rules:
  #   enabled: true
  #   bucket: "rules"
  #   autoProvision: false

  localCache:
    enabled: false

# Security Configuration (used by router feature)
security:
  verification:
    enabled: false
    publicKeyHeader: "Nats-Public-Key"
    signatureHeader: "Nats-Signature"

# Logging Configuration
logging:
  level: info
  outputPath: stdout
  encoding: json

# Prometheus Metrics Configuration
metrics:
  enabled: true
  address: :2112
  path: /metrics
  updateInterval: 15s
