# templates/http-inbound-hmac.yaml
#
# An inbound webhook whose signature is verified with HMAC before the rule
# fires. The gateway treats the `hmac` block as a FAIL-CLOSED gate: a bad,
# missing, or unverifiable signature is rejected with 401 and the rule never
# evaluates. This is transport authentication — you do NOT write a
# {@hmac.valid} condition; declaring the block enforces it.
#
# Example Use Case: A GitHub push webhook signed with HMAC-SHA256.
#
- trigger:
    http:
      path: "/webhooks/github/push"
      method: "POST"
      hmac:
        # Header carrying the signature (required).
        header: "X-Hub-Signature-256"
        # Shared secret (required). Three forms, all existing syntax:
        #   literal:  "s3cr3t"            (discouraged — secret lives in the file)
        #   env var:  "${GITHUB_WEBHOOK_SECRET}"  (expanded at load time)
        #   KV ref:   "{@kv.secrets.github}"      (resolved per request)
        secret: "${GITHUB_WEBHOOK_SECRET}"
        # HMAC hash: sha256 (default) or sha1.
        algorithm: "sha256"
        # Signature encoding in the header: hex (default) or base64.
        encoding: "hex"
        # Optional prefix stripped from the header value before decoding.
        prefix: "sha256="
  conditions:
    operator: and
    items:
      # Conditions still apply after the signature passes the gate.
      - field: "{@header.X-GitHub-Event}"
        operator: eq
        value: "push"
  action:
    nats:
      subject: "github.push.{repository.name}"
      payload: |
        {
          "event": "push",
          "repo": "{repository.name}",
          "ref": "{ref}",
          "pusher": "{pusher.name}",
          "received_at": "{@timestamp()}",
          "event_id": "{@uuid7()}"
        }
