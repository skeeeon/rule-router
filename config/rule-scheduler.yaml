# Rule Scheduler Configuration
# Uses the unified rule-router binary with scheduler feature enabled

features:
  router: false
  gateway: false
  scheduler: true

# NATS Server Connection
nats:
  urls:
    - nats://localhost:4222

  # Authentication (choose one)
  # username: "rule-scheduler-service"
  # password: "secure-password"
  # token: "your-nats-token"
  # nkeySeedFile: "/path/to/nkey.seed"
  # credsFile: "/etc/nats/creds/rule-scheduler.creds"

  # TLS Configuration
  tls:
    enable: false
    # certFile: "/etc/ssl/nats/client-cert.pem"
    # keyFile: "/etc/ssl/nats/client-key.pem"
    # caFile: "/etc/ssl/nats/ca.pem"

  # Action Publish Configuration
  publish:
    mode: jetstream        # "jetstream" (reliable) or "core" (fire-and-forget)
    ackTimeout: 5s
    maxRetries: 3
    retryBaseDelay: 50ms

# HTTP Client Configuration (for HTTP actions)
http:
  client:
    timeout: 30s
    maxIdleConns: 100
    maxIdleConnsPerHost: 10
    idleConnTimeout: 90s
    tls:
      insecureSkipVerify: false

# NATS Key-Value Store (for KV lookups in templates and conditions)
kv:
  enabled: false
  # buckets:
  #   - "building_status"           # String format - watches all keys
  #   - name: "device_config"       # Object format with optional key filter
  #     keyFilter: "region-us.>"

# Logging
logging:
  level: info
  outputPath: stdout
  encoding: json

# Prometheus Metrics
metrics:
  enabled: true
  address: :2114           # Different port from rule-router/http-gateway (:2112) and nats-auth-manager (:2113)
  path: /metrics
  updateInterval: 15s
